<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planum — Chess Strategy Puzzles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #141210;
      font-family: 'Crimson Pro', Georgia, serif;
      -webkit-font-smoothing: antialiased;
    }
    button { font-family: inherit; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes boardReveal {
      from { opacity: 0; transform: scale(0.94) rotate(-1.5deg); }
      to   { opacity: 1; transform: scale(1) rotate(0deg); }
    }
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-8px); }
    }
    @keyframes lineGrow {
      from { transform: scaleX(0); transform-origin: left; }
      to   { transform: scaleX(1); transform-origin: left; }
    }
    @keyframes screenIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulseGlow {
      0%,100% { box-shadow: 0 4px 20px rgba(200,168,75,0.2); }
      50%     { box-shadow: 0 4px 36px rgba(200,168,75,0.45); }
    }
    @keyframes reasonSlide {
      from { opacity: 0; transform: translateY(-6px); max-height: 0; }
      to   { opacity: 1; transform: translateY(0);    max-height: 200px; }
    }

    .anim-0 { animation: fadeUp 0.65s ease both; animation-delay: 0.05s; }
    .anim-1 { animation: fadeUp 0.65s ease both; animation-delay: 0.22s; }
    .anim-2 { animation: fadeUp 0.65s ease both; animation-delay: 0.39s; }
    .anim-3 { animation: fadeUp 0.65s ease both; animation-delay: 0.56s; }
    .anim-4 { animation: fadeUp 0.65s ease both; animation-delay: 0.73s; }
    .anim-5 { animation: fadeUp 0.65s ease both; animation-delay: 0.90s; }
    .anim-6 { animation: fadeUp 0.65s ease both; animation-delay: 1.07s; }

    .board-float {
      animation:
        boardReveal 0.9s cubic-bezier(0.16,1,0.3,1) 0.2s both,
        float 7s ease-in-out 1.2s infinite;
    }

    .play-btn { transition: background 0.18s, transform 0.18s, box-shadow 0.18s !important; }
    .play-btn:hover {
      background: #dbb94f !important;
      transform: translateY(-2px) !important;
      animation: pulseGlow 1.8s ease infinite;
    }
    .play-btn:active { transform: translateY(0) !important; }

    .feature-card { transition: border-color 0.2s, background 0.2s, transform 0.2s; }
    .feature-card:hover {
      border-color: rgba(200,168,75,0.3) !important;
      background: rgba(200,168,75,0.05) !important;
      transform: translateY(-2px);
    }

    .logo-link { transition: opacity 0.2s; }
    .logo-link:hover { opacity: 0.75; }

    .screen-enter { animation: screenIn 0.32s ease both; }

    .next-btn { transition: border-color 0.15s, background 0.15s !important; }
    .next-btn:hover {
      background: rgba(200,168,75,0.08) !important;
      border-color: rgba(200,168,75,0.9) !important;
    }

    .reason-panel { animation: reasonSlide 0.22s ease both; overflow: hidden; }

    .wrong-opt-btn:hover {
      opacity: 0.85 !important;
      border-color: rgba(255,255,255,0.22) !important;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
